[build]
  base    = "frontend"
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

# Proxy /api to Render backend
[[redirects]]
  from = "/api/*"
  to = "https://zentrix-motors-api.onrender.com/api/:splat"
  status = 200
  force = true

# Proxy /uploads to Render backend
[[redirects]]
  from = "/uploads/*"
  to = "https://zentrix-motors-api.onrender.com/uploads/:splat"
  status = 200
  force = true

# Redirect all routes to index.html for React Router
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options        = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy        = "strict-origin-when-cross-origin"
