[build]
  base    = "frontend"
  command = "npm run build"
  publish = "frontend/dist"

[functions]
  directory = "../backend"
  included_files = ["../backend/zentrix.db"]

[build.environment]
  NODE_VERSION = "20"

# Proxy /api to Netlify Function
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/server/api/:splat"
  status = 200
  force = true

# Redirect all routes to index.html for React Router
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options        = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy        = "strict-origin-when-cross-origin"
